<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>404 Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #1e1127;
        font-family: 'Poppins', sans-serif;
      }

      .card {
        background-color: #2a1535;
        border-radius: 20px;
        padding: 48px 56px;
        text-align: center;
        border: 1px solid #ff79c6;
        box-shadow: 0 0 24px rgba(255, 121, 198, 0.15);
      }

      h1 {
        font-size: 3rem;
        font-weight: 800;
        color: #ff79c6;
        margin: 0 0 12px 0;
        letter-spacing: -1px;
      }

      p {
        font-size: 1rem;
        font-weight: 400;
        color: #bd93f9;
        margin: 0;
      }

      .emoji {
        font-size: 2rem;
        margin-bottom: 16px;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <span class="emoji">‼️</span>
      <h1>Oops!</h1>
      <p>Sorry, I don't know what you're asking for</p>
      <p>Rust is running from Anya's machine</p>
    </div>
  </body>
</html>
